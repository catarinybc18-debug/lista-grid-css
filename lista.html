<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .container{display: grid;
        grid-template-rows: 100px 200px 30vh;
        grid-template-areas: "cabecario cabecario cabecario cabecario"
                             "main main . sidebar"
                             "footer footer footer footer";        }
        
        .box{border:1px solid black;}
        
        #box1{}
        
        #box1{grid-area: cabecario;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: orange;}

        #box2{grid-area: main;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: blue;}

        #box3{grid-area: sidebar;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: red;}

        #box4{grid-area: footer;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: green;}

        #box5{
        display: flex;
        align-items: center;
        justify-content: center;
        }
        
        </style>

    


</head>
<body>
    <div class="container">
        <div class="box" id="box1">Header</div>
        <div class="box" id="box2">Main</div>
        <div class="box" id="box3">Sidebar</div>
        <div class="box" id="box4">Footer</div>
        <div class="box" id="box5">Empty</div>
        
    </div>

</body>
</html>
