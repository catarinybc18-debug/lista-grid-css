<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Layout Grid</title>

<style>
body {
    margin: 0;
    height: 100vh;
}

.container {
    display: grid;
    grid-template-areas:
        "header header"
        "menu content"
        "footer footer";
    grid-template-columns: 200px 1fr;
    grid-template-rows: 80px 1fr 60px;
    height: 100%;
}

header {
    grid-area: header;
    background: lightblue;
}

nav {
    grid-area: menu;
    background: lightgray;
}

main {
    grid-area: content;
    background: white;
}

footer {
    grid-area: footer;
    background: lightgreen;
}
</style>
</head>

<body>
<div class="container">
    <header>Header</header>
    <nav>Menu</nav>
    <main>Conteúdo</main>
    <footer>Footer</footer>
</div>
</body>
</html>
